experiment:
  # Keep optimizer / clipping aligned with strong recurrent baselines.
  # Tree policies still drift late; reduce PPO update intensity for stability.
  on_policy_minibatch_size: 200
  on_policy_collected_frames_per_batch: 2400
  on_policy_n_envs_per_worker: 10

algorithm:
  # Match baseline PPO weighting so value learning is not underweighted.
  entropy_coef: 0.0005

# Applies to direct tree policy/critic configs (treelstm, treetransformer, treegnn)
# Keep cross-agent attention off by default (transformer_layers: 0) for stability.
model:
  hidden_size: 128
  tree_embedding_size: 128
  transformer_layers: 0
  transformer_heads: 4
  transformer_ff_mult: 2
  gnn_layers: 2
  gnn_heads: 4

critic_model:
  hidden_size: 128
  tree_embedding_size: 128
  transformer_layers: 0
  transformer_heads: 4
  transformer_ff_mult: 2
  gnn_layers: 2
  gnn_heads: 4

# Applies to non-tree second stage when using sequence hybrids.
sequence_recurrent_model:
  hidden_size: 128
  n_layers: 1
  mlp_num_cells: [256, 256]

sequence_mlp_model:
  num_cells: [256, 256]
