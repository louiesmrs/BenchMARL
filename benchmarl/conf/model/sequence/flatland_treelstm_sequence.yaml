defaults:
  - _self_

layers:
  l1:
    name: flatland_treelstm_feature
    hidden_size: 128
    tree_embedding_size: 128
    num_nodes: 31
    num_edges: 30
    agent_attr_size: 83
    node_attr_size: 12
    num_actions: 5
    transformer_heads: 4
    transformer_layers: 0
    transformer_ff_mult: 2
  l2:
    name: gru
    hidden_size: 128
    n_layers: 1
    bias: true
    dropout: 0
    compile: false
    mlp_num_cells: [256, 256]
    mlp_layer_class: torch.nn.Linear
    mlp_activation_class: torch.nn.Tanh
    mlp_activation_kwargs: null
    mlp_norm_class: null
    mlp_norm_kwargs: null

intermediate_sizes: [128]
